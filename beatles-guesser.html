<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Beatles Guesser</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #f0f0f0;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #555;
      margin-bottom: 48px;
      letter-spacing: 0.04em;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    /* Album art */
    .art-container {
      width: 180px;
      height: 180px;
      border-radius: 12px;
      background: #111;
      overflow: hidden;
      position: relative;
      border: 1px solid #2a2a2a;
    }

    .art-blur {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: blur(24px) brightness(0.4);
      transform: scale(1.15);
      transition: filter 0.6s ease, transform 0.6s ease;
    }

    .art-blur.revealed {
      filter: blur(0px) brightness(1);
      transform: scale(1);
    }

    .art-placeholder {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      color: #333;
    }

    /* Play button */
    .play-btn {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #e8c84a;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.1s;
      flex-shrink: 0;
    }
    .play-btn:hover:not(:disabled) { background: #f5d96a; transform: scale(1.05); }
    .play-btn:active:not(:disabled) { transform: scale(0.97); }
    .play-btn:disabled { background: #2a2a2a; cursor: not-allowed; }
    .play-btn svg { width: 32px; height: 32px; }

    /* Big score shown in place of play button after reveal */
    .score-display {
      display: none;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #1a1a1a;
      border: 2px solid #2a2a2a;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      flex-shrink: 0;
    }
    .score-display.visible { display: flex; }
    .score-display .sd-fraction {
      font-size: 1.5rem;
      font-weight: 800;
      color: #e8c84a;
      line-height: 1;
    }
    .score-display .sd-label {
      font-size: 0.6rem;
      color: #555;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-top: 2px;
    }

    /* Progress bar */
    .progress-bar-wrap {
      width: 100%;
      height: 4px;
      background: #2a2a2a;
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      width: 0%;
      background: #e8c84a;
      border-radius: 2px;
      transition: width 1s linear;
    }

    .status-text {
      font-size: 0.8rem;
      color: #555;
      min-height: 1.2em;
      text-align: center;
    }

    /* Mic button */
    .mic-btn {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #2a2a2a;
      border: 2px solid #444;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, border-color 0.2s, transform 0.1s;
      flex-shrink: 0;
    }
    .mic-btn.visible { display: flex; }
    .mic-btn:hover { background: #333; border-color: #666; transform: scale(1.05); }
    .mic-btn:active { transform: scale(0.97); }
    .mic-btn.listening {
      background: #c0392b;
      border-color: #e74c3c;
      animation: pulse 1s infinite;
    }
    .mic-btn svg { width: 26px; height: 26px; }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.4); }
      50%       { box-shadow: 0 0 0 10px rgba(231, 76, 60, 0); }
    }

    /* Transcript box */
    .transcript-box {
      width: 100%;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 1rem;
      color: #f0f0f0;
      text-align: center;
      min-height: 48px;
      display: none;
      align-items: center;
      justify-content: center;
    }
    .transcript-box.visible { display: flex; }
    .transcript-box.interim { color: #777; font-style: italic; }
    .transcript-box.final   { color: #f0f0f0; font-style: normal; }

    /* Result badge */
    .result-badge {
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: 0.05em;
      display: none;
      text-align: center;
    }
    .result-badge.visible { display: block; }
    .result-badge.correct { color: #2ecc71; }
    .result-badge.wrong   { color: #e87a4a; }

    /* Text guess row */
    .guess-row {
      width: 100%;
      display: none;
      gap: 8px;
      align-items: center;
    }
    .guess-row.visible { display: flex; }

    .guess-input {
      flex: 1;
      background: #111;
      border: 1px solid #3a3a3a;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 1rem;
      color: #f0f0f0;
      outline: none;
      transition: border-color 0.2s;
    }
    .guess-input::placeholder { color: #444; }
    .guess-input:focus { border-color: #e8c84a; }

    .guess-submit {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      background: #e8c84a;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 1.2rem;
      transition: background 0.2s;
    }
    .guess-submit:hover { background: #f5d96a; }

    /* Skip button */
    .skip-btn {
      width: 100%;
      padding: 14px;
      background: transparent;
      border: 1px solid #444;
      color: #aaa;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      display: none;
    }
    .skip-btn:hover { background: #2a2a2a; border-color: #666; color: #f0f0f0; }
    .skip-btn.visible { display: block; }

    /* Reveal button */
    .reveal-btn {
      width: 100%;
      padding: 14px;
      background: transparent;
      border: 1px solid #e8c84a;
      color: #e8c84a;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
      display: none;
    }
    .reveal-btn:hover { background: #e8c84a22; }
    .reveal-btn.visible { display: block; }

    /* Answer */
    .answer {
      text-align: center;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .answer.visible { display: flex; }

    .song-name { font-size: 1.3rem; font-weight: 700; color: #f0f0f0; }
    .album-name { font-size: 0.85rem; color: #777; }

    /* Next button */
    .next-btn {
      width: 100%;
      padding: 14px;
      background: #e8c84a;
      border: none;
      color: #0d0d0d;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
      display: none;
    }
    .next-btn:hover { background: #f5d96a; }
    .next-btn.visible { display: block; }

    /* Score */
    .score {
      font-size: 0.8rem;
      color: #444;
      letter-spacing: 0.05em;
    }
    .score span { color: #e8c84a; font-weight: 700; }

    /* Error */
    .error-msg {
      font-size: 0.8rem;
      color: #e87a4a;
      text-align: center;
      display: none;
    }
    .error-msg.visible { display: block; }

    /* Page background in final mode */
    body.final-mode {
      background-size: cover;
      background-position: center bottom;
    }
    body.final-mode::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(13,13,13,0.72);
      z-index: 0;
      pointer-events: none;
    }
    body.final-mode > * { position: relative; z-index: 1; }
    #confettiCanvas { z-index: 999 !important; }

    /* Final screen */
    .final-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      text-align: center;
      width: 100%;
    }
    .final-screen.visible { display: flex; }

    .final-title {
      font-size: 0.85rem;
      font-weight: 700;
      color: #aaa;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .final-score {
      font-size: 3.2rem;
      font-weight: 800;
      color: #e8c84a;
      line-height: 1;
    }

    /* Song recap list */
    .song-list {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 5px;
      text-align: left;
    }
    .song-row {
      display: flex;
      align-items: center;
      gap: 9px;
      background: rgba(0,0,0,0.35);
      border-radius: 8px;
      padding: 7px 12px;
      font-size: 0.82rem;
    }
    .song-row .sr-icon { font-size: 0.9rem; flex-shrink: 0; font-weight: 700; }
    .song-row .sr-name { color: #f0f0f0; font-weight: 600; flex: 1; }
    .song-row .sr-album { color: #555; font-size: 0.72rem; }

    /* Trivia */
    .trivia-box {
      width: 100%;
      background: rgba(0,0,0,0.35);
      border-left: 3px solid #e8c84a;
      border-radius: 0 8px 8px 0;
      padding: 9px 13px;
      text-align: left;
      font-size: 0.78rem;
      color: #aaa;
      line-height: 1.5;
    }
    .trivia-label {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #e8c84a;
      margin-bottom: 3px;
    }

    .play-again-btn {
      width: 100%;
      padding: 12px;
      background: #e8c84a;
      border: none;
      color: #0d0d0d;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }
    .play-again-btn:hover { background: #f5d96a; }

    /* Confetti canvas */
    #confettiCanvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 999;
    }
  </style>
</head>
<body>

  <canvas id="confettiCanvas"></canvas>

  <h1>The Beatles Guesser</h1>
  <p class="subtitle">Can you name the song in one second?</p>

  <div class="card">
    <div class="art-container">
      <div class="art-placeholder" id="artPlaceholder">🎵</div>
      <img class="art-blur" id="artImg" style="display:none" />
    </div>

    <button class="play-btn" id="playBtn">
      <svg viewBox="0 0 24 24" fill="#0d0d0d"><polygon points="6,3 20,12 6,21"/></svg>
    </button>
    <div class="score-display" id="scoreDisplay"></div>

    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>

    <div class="status-text" id="statusText">Press play to hear 1 second</div>
    <div class="error-msg" id="errorMsg">Couldn't load songs. Check your connection and reload.</div>

    <button class="mic-btn" id="micBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="#f0f0f0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="2" width="6" height="12" rx="3"/>
        <path d="M5 10a7 7 0 0 0 14 0"/>
        <line x1="12" y1="19" x2="12" y2="22"/>
        <line x1="8" y1="22" x2="16" y2="22"/>
      </svg>
    </button>

    <!-- Text input guess -->
    <div class="guess-row" id="guessRow">
      <input class="guess-input" id="guessInput" type="text" placeholder="Type the song name…" autocomplete="off" />
      <button class="guess-submit" id="guessSubmit">→</button>
    </div>


    <div class="result-badge" id="resultBadge"></div>

    <button class="reveal-btn" id="revealBtn">Reveal Answer</button>
    <button class="skip-btn" id="skipBtn">Skip</button>

    <div class="answer" id="answer">
      <div class="song-name" id="songName"></div>
      <div class="album-name" id="albumName"></div>
    </div>

    <button class="next-btn" id="nextBtn">Next Song →</button>

    <div class="score">
      <span id="correctCount">0</span> correct &nbsp;·&nbsp; <span id="songsPlayed">0</span> / 5 played
    </div>

    <!-- Final screen -->
    <div class="final-screen" id="finalScreen">
      <div class="final-title">Final Score</div>
      <div class="final-score" id="finalScore"></div>
      <div class="song-list" id="songList"></div>
      <div class="trivia-box" id="triviaBox" style="display:none">
        <div class="trivia-label">Did you know?</div>
        <div id="triviaText">Loading trivia…</div>
      </div>
      <button class="play-again-btn" id="playAgainBtn">Play Again</button>
    </div>
  </div>

  <script>
    // ── DOM refs ──────────────────────────────────────────────────
    const playBtn        = document.getElementById('playBtn');
    const scoreDisplay   = document.getElementById('scoreDisplay');
    const progressFill   = document.getElementById('progressFill');
    const statusText     = document.getElementById('statusText');
    const micBtn         = document.getElementById('micBtn');
    const guessRow       = document.getElementById('guessRow');
    const guessInput     = document.getElementById('guessInput');
    const guessSubmit    = document.getElementById('guessSubmit');
    const resultBadge    = document.getElementById('resultBadge');
    const revealBtn      = document.getElementById('revealBtn');
    const skipBtn        = document.getElementById('skipBtn');
    const answer         = document.getElementById('answer');
    const songName       = document.getElementById('songName');
    const albumName      = document.getElementById('albumName');
    const nextBtn        = document.getElementById('nextBtn');
    const artImg         = document.getElementById('artImg');
    const artPlaceholder = document.getElementById('artPlaceholder');
    const errorMsg       = document.getElementById('errorMsg');
    const correctCount   = document.getElementById('correctCount');
    const songsPlayed    = document.getElementById('songsPlayed');
    const finalScreen    = document.getElementById('finalScreen');
    const finalScore     = document.getElementById('finalScore');
    const songList       = document.getElementById('songList');
    const triviaBox      = document.getElementById('triviaBox');
    const triviaText     = document.getElementById('triviaText');
    const playAgainBtn   = document.getElementById('playAgainBtn');

    const MAX_ROUNDS = 5;

    let songs = [], currentSong = null, audio = null;
    let hasPlayed = false, isListening = false;
    let correct = 0, played = 0;
    let lastTranscript = '';
    let playedSongs = []; // {song, guessed}

    // ── Beatles judge SVG (inline, no network needed) ─────────────
    function generateScoreSVG(n) {
      const skin = '#f5c9a0';
      const stars = [
        [40,25,2],[120,15,1.5],[200,40,2.5],[320,20,1.5],[450,10,2],
        [560,35,1.5],[670,18,2],[740,42,1.5],[80,55,1],[370,50,2],
        [600,55,1.5],[760,28,1],[25,70,1.5],[490,60,2],[280,65,1],
      ].map(([x,y,r]) => `<circle cx="${x}" cy="${y}" r="${r}" fill="#e8c84a" opacity="0.5"/>`).join('');

      function fig(cx, suit, hair, glasses, paddleRight) {
        const px = paddleRight ? cx + 90 : cx - 90;
        const py = 190;
        const ax = paddleRight ? cx + 30 : cx - 30;
        const ex = paddleRight ? cx + 75 : cx - 75;
        return `
          <rect x="${cx-18}" y="272" width="15" height="62" rx="7" fill="${suit}"/>
          <rect x="${cx+3}"  y="272" width="15" height="62" rx="7" fill="${suit}"/>
          <ellipse cx="${cx-10}" cy="335" rx="14" ry="6" fill="#111"/>
          <ellipse cx="${cx+10}" cy="335" rx="14" ry="6" fill="#111"/>
          <path d="M${cx-36},272 Q${cx-42},205 ${cx-26},193 L${cx},198 L${cx+26},193 Q${cx+42},205 ${cx+36},272 Z" fill="${suit}"/>
          <rect x="${cx-7}" y="202" width="14" height="58" rx="3" fill="white"/>
          <polygon points="${cx},207 ${cx-5},242 ${cx},237 ${cx+5},242" fill="#c0392b"/>
          <rect x="${cx-8}" y="184" width="16" height="18" rx="4" fill="${skin}"/>
          <ellipse cx="${cx}" cy="161" rx="33" ry="37" fill="${skin}"/>
          <ellipse cx="${cx}" cy="133" rx="35" ry="16" fill="${hair}"/>
          <rect x="${cx-35}" y="133" width="70" height="20" rx="5" fill="${hair}"/>
          ${glasses ? `
            <circle cx="${cx-12}" cy="164" r="9" fill="none" stroke="#bbb" stroke-width="2.5"/>
            <circle cx="${cx+12}" cy="164" r="9" fill="none" stroke="#bbb" stroke-width="2.5"/>
            <line x1="${cx-3}" y1="164" x2="${cx+3}" y2="164" stroke="#bbb" stroke-width="2"/>
            <line x1="${cx-21}" y1="162" x2="${cx-27}" y2="160" stroke="#bbb" stroke-width="2"/>
            <line x1="${cx+21}" y1="162" x2="${cx+27}" y2="160" stroke="#bbb" stroke-width="2"/>
          ` : `
            <ellipse cx="${cx-11}" cy="164" rx="4" ry="4.5" fill="#1a0800"/>
            <ellipse cx="${cx+11}" cy="164" rx="4" ry="4.5" fill="#1a0800"/>
          `}
          <path d="M${cx-9},176 Q${cx},185 ${cx+9},176" fill="none" stroke="#9b5e2a" stroke-width="2" stroke-linecap="round"/>
          ${paddleRight
            ? `<line x1="${cx-30}" y1="218" x2="${cx-58}" y2="263" stroke="${skin}" stroke-width="11" stroke-linecap="round"/>`
            : `<line x1="${cx+30}" y1="218" x2="${cx+58}" y2="263" stroke="${skin}" stroke-width="11" stroke-linecap="round"/>`}
          <line x1="${ax}" y1="218" x2="${ex}" y2="${py}" stroke="${skin}" stroke-width="11" stroke-linecap="round"/>
          <rect x="${px-4}" y="${py+2}" width="8" height="48" rx="4" fill="#7a5c10"/>
          <circle cx="${px}" cy="${py}" r="40" fill="#e8c84a"/>
          <circle cx="${px}" cy="${py}" r="34" fill="#f5d96a"/>
          <text x="${px}" y="${py+14}" text-anchor="middle" fill="#0d0d0d" font-size="44" font-weight="900" font-family="Arial">${n}</text>
        `;
      }

      return `<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="svgbg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#0d0d1a"/>
            <stop offset="100%" style="stop-color:#1a0a2e"/>
          </linearGradient>
        </defs>
        <rect width="800" height="360" fill="url(#svgbg)"/>
        ${stars}
        <rect x="0" y="338" width="800" height="22" fill="#150a00" opacity="0.7"/>
        <rect x="0" y="336" width="800" height="4" fill="#e8c84a" opacity="0.25"/>
        <text x="400" y="36" text-anchor="middle" fill="#e8c84a" font-size="20" font-weight="bold" letter-spacing="3" font-family="Arial">THE FAB FOUR HAVE SCORED YOU</text>
        ${fig(108,  '#222',   '#1a0800', true,  false)}
        ${fig(292,  '#1a2545','#0a0400', false, false)}
        ${fig(508,  '#2a1a08','#0a0400', false, true)}
        ${fig(692,  '#3a0a10','#0a0400', false, true)}
      </svg>`;
    }

    // ── Beatles trivia database ────────────────────────────────────
    const TRIVIA = {
      'hey jude': 'Paul McCartney wrote "Hey Jude" to comfort John Lennon\'s son Julian during his parents\' divorce.',
      'let it be': '"Let It Be" was inspired by a dream Paul McCartney had about his late mother Mary speaking words of wisdom to him.',
      'come together': 'John Lennon originally wrote "Come Together" as a campaign song for Timothy Leary\'s California governor run.',
      'yesterday': '"Yesterday" is the most covered song in history, with over 2,200 recorded versions.',
      'something': 'George Harrison\'s "Something" was Frank Sinatra\'s favourite Beatles song — he called it the greatest love song of the past 50 years.',
      'here comes the sun': 'George Harrison wrote "Here Comes the Sun" in Eric Clapton\'s garden while skipping a boring Apple Corps business meeting.',
      'blackbird': 'Paul McCartney wrote "Blackbird" inspired by news of the civil rights struggle in the United States in 1968.',
      'in my life': '"In My Life" was voted the greatest song of all time by Mojo magazine in 2000.',
      'strawberry fields forever': 'John Lennon named "Strawberry Fields Forever" after a Salvation Army children\'s home near his childhood home in Liverpool.',
      'penny lane': '"Penny Lane" is a real street in Liverpool where both John and Paul grew up and caught the bus into town.',
      'a day in the life': 'The famous orchestral crescendo in "A Day in the Life" used a 40-piece orchestra playing from their lowest note to their highest.',
      'eleanor rigby': '"Eleanor Rigby" features no Beatles playing instruments — it\'s entirely performed by a string octet.',
      'norwegian wood': '"Norwegian Wood" was one of the first Western pop songs to feature the sitar, inspired by George Harrison\'s interest in Indian music.',
      'ticket to ride': 'John Lennon claimed "Ticket to Ride" was one of the first heavy metal songs ever recorded.',
      'help': 'John Lennon later admitted "Help!" was a genuine cry for help, not just a pop song — he was deeply unhappy at the time.',
      'twist and shout': '"Twist and Shout" was recorded in one take at the very end of a marathon session — John Lennon had a cold and his voice was nearly gone.',
      'love me do': '"Love Me Do" was the Beatles\' first single, released in October 1962, marking the start of Beatlemania.',
      'she loves you': '"She Loves You" was the best-selling UK single of the 1960s, with "yeah yeah yeah" becoming one of music\'s most iconic phrases.',
      'i want to hold your hand': '"I Want to Hold Your Hand" was the Beatles\' first US number one, launching the British Invasion.',

    function getTriviaFor(songTitle) {
      const key = songTitle.toLowerCase().replace(/[''']s?\b/g, s => s.replace(/'/g,"'")).replace(/[^a-z0-9\s]/g,'').trim();
      // Try exact match first, then partial
      if (TRIVIA[key]) return TRIVIA[key];
      const keys = Object.keys(TRIVIA);
      const partial = keys.find(k => key.includes(k) || k.includes(key));
      if (partial) return TRIVIA[partial];
      return `"${songTitle}" was recorded at Abbey Road Studios in London — the studio where almost every Beatles album was made.`;
    }

    // ── Fuzzy match ───────────────────────────────────────────────
    const STOP = new Set(['the','a','an','of','for','and','or','in','on','at','to',
                          'its','it','i','my','your','our','with','that','this','is',
                          'be','by','do','so','no','oh','ah','if','as','up','me']);

    function normalize(str) {
      return str.toLowerCase()
        .replace(/['‘’]s\b/g, '') // Maxwell's → maxwell, not maxwells
        .replace(/[^a-z0-9\s]/g, '')
        .split(/\s+/)
        .filter(w => w && !STOP.has(w));
    }

    function isCorrect(guess, title) {
      const gw = normalize(guess);
      // Strip parenthetical suffixes like "(2022 Mix)", "(Remastered 2009)" from titles
      const cleanTitle = title.replace(/\s*\([^)]*\)/g, '').trim();
      const tw = normalize(cleanTitle);
      if (!gw.length) return false;
      const tSet = new Set(tw);
      const matches = gw.filter(w => tSet.has(w)).length;
      // Score based on YOUR words matched — extra title words (e.g. "2019 Mix") don't penalise
      return (matches / gw.length) >= 0.5;
    }

    // ── Confetti ──────────────────────────────────────────────────
    const canvas = document.getElementById('confettiCanvas');
    const ctx    = canvas.getContext('2d');
    let particles = [], confettiRaf = null;

    const COLORS = ['#e8c84a','#2ecc71','#3498db','#e74c3c','#9b59b6','#f39c12','#1abc9c'];

    function launchConfetti() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
      particles = Array.from({ length: 120 }, () => ({
        x:  Math.random() * canvas.width,
        y:  -10 - Math.random() * 40,
        r:  4 + Math.random() * 6,
        d:  2 + Math.random() * 3,
        color: COLORS[Math.floor(Math.random() * COLORS.length)],
        tilt: Math.random() * 10 - 5,
        tiltSpeed: 0.1 + Math.random() * 0.15,
        tiltAngle: 0,
        opacity: 1,
      }));
      if (confettiRaf) cancelAnimationFrame(confettiRaf);
      let elapsed = 0;
      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        elapsed++;
        if (elapsed > 180) {
          // fade out
          particles.forEach(p => { p.opacity = Math.max(0, p.opacity - 0.02); });
          if (particles.every(p => p.opacity <= 0)) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            return;
          }
        }
        particles.forEach(p => {
          p.y += p.d;
          p.tiltAngle += p.tiltSpeed;
          p.tilt = Math.sin(p.tiltAngle) * 12;
          if (p.y > canvas.height + 20) {
            p.y = -10; p.x = Math.random() * canvas.width;
          }
          ctx.save();
          ctx.globalAlpha = p.opacity;
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.ellipse(p.x + p.tilt, p.y, p.r, p.r * 0.4, p.tiltAngle, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        });
        confettiRaf = requestAnimationFrame(draw);
      }
      draw();
    }

    // ── Speech recognition ────────────────────────────────────────
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;

    if (SR) {
      recognition = new SR();
      recognition.lang = 'en-US';
      recognition.interimResults = true;
      recognition.continuous = false;

      recognition.onstart = () => {
        isListening = true;
        micBtn.classList.add('listening');
        statusText.textContent = '🎙 Listening…';
        guessInput.value = '';
        lastTranscript = '';
      };

      recognition.onresult = (e) => {
        let interim = '', final = '';
        for (let i = e.resultIndex; i < e.results.length; i++) {
          const t = e.results[i][0].transcript;
          if (e.results[i].isFinal) final += t;
          else interim += t;
        }
        lastTranscript = final || interim;
        guessInput.value = lastTranscript;
      };

      recognition.onend = () => {
        isListening = false;
        micBtn.classList.remove('listening');
        if (!lastTranscript.trim()) {
          statusText.textContent = 'Nothing heard — try again';
        } else {
          submitTextGuess();
        }
      };

      recognition.onerror = (e) => {
        isListening = false;
        micBtn.classList.remove('listening');
        statusText.textContent = e.error === 'not-allowed'
          ? 'Mic blocked — allow access and try again'
          : 'Mic error — try again or reveal';
        revealBtn.classList.add('visible');
      };
    }

    // ── Song loading ──────────────────────────────────────────────
    async function loadSongs() {
      try {
        const res  = await fetch('https://itunes.apple.com/search?term=the+beatles&entity=song&limit=200&country=US');
        const data = await res.json();
        songs = data.results.filter(s => s.previewUrl && s.artworkUrl100 && s.artistName === 'The Beatles');
        if (!songs.length) throw new Error();
        pickSong();
      } catch {
        errorMsg.classList.add('visible');
        statusText.textContent = '';
        playBtn.disabled = true;
      }
    }

    function pickSong() {
      if (audio) { audio.pause(); audio = null; }
      if (recognition && isListening) recognition.abort();

      hasPlayed = false; isListening = false; lastTranscript = '';

      progressFill.style.transition = 'none';
      progressFill.style.width = '0%';
      micBtn.classList.remove('visible', 'listening');
      guessRow.classList.remove('visible');
      guessInput.value = '';
      skipBtn.classList.remove('visible');
      resultBadge.classList.remove('visible', 'correct', 'wrong');
      resultBadge.textContent = '';
      revealBtn.classList.remove('visible');
      answer.classList.remove('visible');
      nextBtn.classList.remove('visible');
      artImg.style.display = 'none';
      artPlaceholder.style.display = 'flex';
      artImg.classList.remove('revealed');
      statusText.textContent = 'Press play to hear 1 second';
      playBtn.disabled = false;
      playBtn.style.display = '';
      playBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="#0d0d0d"><polygon points="6,3 20,12 6,21"/></svg>`;
      scoreDisplay.classList.remove('visible');
      nextBtn.textContent = 'Next Song →';

      currentSong = songs[Math.floor(Math.random() * songs.length)];
      artImg.src = currentSong.artworkUrl100.replace('100x100bb', '600x600bb');
      artImg.style.display = 'block';
    }

    function playSong() {
      if (!currentSong || hasPlayed) return;
      hasPlayed = true;
      playBtn.disabled = true;
      audio = new Audio(currentSong.previewUrl);

      audio.addEventListener('canplaythrough', () => {
        audio.currentTime = 0;
        audio.play();
        statusText.textContent = '🎵 Listen carefully…';

        progressFill.style.transition = 'none';
        progressFill.style.width = '0%';
        requestAnimationFrame(() => requestAnimationFrame(() => {
          progressFill.style.transition = 'width 1s linear';
          progressFill.style.width = '100%';
        }));

        setTimeout(() => {
          audio.pause();
          statusText.textContent = 'Type or say the song name';
          guessRow.classList.add('visible');
          skipBtn.classList.add('visible');
          guessInput.focus();
          if (recognition) micBtn.classList.add('visible');
          else revealBtn.classList.add('visible');
        }, 1000);
      }, { once: true });

      audio.addEventListener('error', () => {
        statusText.textContent = 'Preview failed — try next song';
        nextBtn.classList.add('visible');
      }, { once: true });

      audio.load();
    }

    function submitTextGuess() {
      const typed = guessInput.value.trim();
      if (!typed) return;
      lastTranscript = typed;
      revealSong();
    }

    function revealSong() {
      statusText.textContent = '';
      revealBtn.classList.remove('visible');
      micBtn.classList.remove('visible');
      guessRow.classList.remove('visible');
      skipBtn.classList.remove('visible');
      answer.classList.add('visible');
      nextBtn.classList.add('visible');

      songName.textContent = currentSong.trackName;
      albumName.textContent = currentSong.collectionName + ' (' + (currentSong.releaseDate?.slice(0, 4) ?? '') + ')';
      artImg.classList.add('revealed');
      artPlaceholder.style.display = 'none';

      played++;
      songsPlayed.textContent = played;

      // Check guess
      const guess = lastTranscript.trim();
      let guessedRight = false;
      if (guess) {
        guessedRight = isCorrect(guess, currentSong.trackName);
        resultBadge.classList.add('visible', guessedRight ? 'correct' : 'wrong');
        if (guessedRight) {
          resultBadge.textContent = '✓ Correct!';
          correct++;
          correctCount.textContent = correct;
          launchConfetti();
        } else {
          resultBadge.textContent = '✗ Not quite';
          statusText.textContent = 'Better luck next time!';
        }
      }
      playedSongs.push({ song: currentSong, guessed: guessedRight });

      // Swap play button for big score (after correct may have been incremented)
      playBtn.style.display = 'none';
      scoreDisplay.innerHTML = `<span class="sd-fraction">${correct}/${played}</span><span class="sd-label">score</span>`;
      scoreDisplay.classList.add('visible');

      // After last round, swap Next Song for final screen trigger
      if (played >= MAX_ROUNDS) {
        nextBtn.textContent = 'See Final Score →';
      }
    }

    function showFinalScreen() {
      document.querySelector('.art-container').style.display = 'none';
      scoreDisplay.classList.remove('visible');
      scoreDisplay.style.display = 'none';
      answer.classList.remove('visible');
      nextBtn.classList.remove('visible');
      resultBadge.classList.remove('visible', 'correct', 'wrong');
      document.querySelector('.progress-bar-wrap').style.display = 'none';

      finalScore.textContent = `${correct} / ${MAX_ROUNDS}`;
      finalScreen.classList.add('visible');
      if (correct === MAX_ROUNDS) launchConfetti();

      // ── SVG as full page background ───────────────────────────────
      const svgStr = generateScoreSVG(correct);
      const encoded = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgStr);
      document.body.style.backgroundImage = `url("${encoded}")`;
      document.body.classList.add('final-mode');
      document.querySelector('h1').style.display = 'none';
      document.querySelector('.subtitle').style.display = 'none';

      // ── Song recap list ───────────────────────────────────────────
      songList.innerHTML = '';
      playedSongs.forEach(({ song, guessed }) => {
        const row = document.createElement('div');
        row.className = 'song-row';
        const year = song.releaseDate?.slice(0, 4) ?? '';
        row.innerHTML = `
          <span class="sr-icon" style="color:${guessed ? '#2ecc71' : '#e87a4a'};font-weight:700">${guessed ? '✓' : '✗'}</span>
          <span class="sr-name">${song.trackName}</span>
          <span class="sr-album">${year}</span>`;
        songList.appendChild(row);
      });

      // ── Trivia (hardcoded, prefer a song the player got wrong) ────
      const triviaSource = playedSongs.find(p => !p.guessed) ?? playedSongs[0];
      if (triviaSource) {
        triviaBox.style.display = 'block';
        triviaText.textContent = getTriviaFor(triviaSource.song.trackName);
      }
    }

    function resetGame() {
      correct = 0; played = 0; playedSongs = [];
      correctCount.textContent = 0;
      songsPlayed.textContent = 0;
      finalScreen.classList.remove('visible');
      document.body.classList.remove('final-mode');
      document.body.style.backgroundImage = '';
      document.querySelector('h1').style.display = '';
      document.querySelector('.subtitle').style.display = '';
      document.querySelector('.art-container').style.display = '';
      document.querySelector('.progress-bar-wrap').style.display = '';
      scoreDisplay.style.display = '';
      nextBtn.textContent = 'Next Song →';
      pickSong();
    }

    playBtn.addEventListener('click', playSong);
    micBtn.addEventListener('click', () => { if (!isListening) recognition?.start(); });
    guessSubmit.addEventListener('click', submitTextGuess);
    guessInput.addEventListener('keydown', e => { if (e.key === 'Enter') submitTextGuess(); });
    revealBtn.addEventListener('click', revealSong);
    skipBtn.addEventListener('click', revealSong);
    nextBtn.addEventListener('click', () => { played >= MAX_ROUNDS ? showFinalScreen() : pickSong(); });

    playAgainBtn.addEventListener('click', resetGame);

    loadSongs();
  </script>
</body>
</html>
